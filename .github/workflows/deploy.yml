name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 14 * * *' # Daily at 9am CT — publishes future-dated posts
  workflow_dispatch:

# Force Node 24 for any third-party action whose action.yml still
# declares `using: node20`. Notably cloudflare/wrangler-action@v3
# ships on Node 20 until they cut v4. Drop this when every action
# below advertises node24 natively.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: bun run build:ci
        env:
          CDN_BASE_URL: ${{ vars.CDN_BASE_URL }}

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config dist/server/wrangler.json

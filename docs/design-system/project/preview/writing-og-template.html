<!doctype html>
<html><head><meta charset="utf-8"><title>OG</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #ddd; }
  .frame { width: 600px; height: 315px; background: var(--paper); position: relative; box-sizing: border-box; padding: 40px; margin: 12px auto; border: 1px solid var(--rule); }
  .eb { font-family: var(--mono); font-size: 11px; color: var(--clay); letter-spacing: 2px; text-transform: uppercase; }
  h1 { font-family: var(--serif); font-size: 36px; line-height: 1.1; font-weight: 700; letter-spacing: -0.022em; color: var(--ink); margin: 14px 0 0; max-width: 90%; text-wrap: balance; }
  .footer { position: absolute; left: 40px; right: 40px; bottom: 32px; padding-top: 16px; border-top: 1px solid var(--rule); display: flex; justify-content: space-between; align-items: baseline; }
  .wm { font-family: var(--serif); font-size: 18px; font-weight: 700; color: var(--ink); }
  .wm .dot { color: var(--clay); }
  .url { font-family: var(--mono); font-size: 10px; color: var(--ink-3); }
  .note { font-family: var(--mono); font-size: 10px; color: var(--ink-3); text-align: center; margin-top: 8px; }
</style></head>
<body>
  <div class="frame">
    <div class="eb">Tax tools</div>
    <h1>Notes on Drake export, again</h1>
    <div class="footer">
      <div class="wm">Birdcar<span class="dot">.</span></div>
      <div class="url">birdcar.dev/writing/drake-export-2</div>
    </div>
  </div>
  <div class="note">1200 × 630 — shown at 50% scale</div>
</body></html>

<!doctype html>
<html><head><meta charset="utf-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--paper); }
  .card { padding: 28px 32px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; min-height: 240px; }
  .big { font-family: var(--serif); font-size: 32px; font-weight: 700; color: var(--ink); letter-spacing: -0.02em; }
  .quote { font-family: var(--mono); font-size: 12px; color: var(--ink-3); text-align: center; max-width: 480px; line-height: 1.6; }
</style></head>
<body><div class="card">
  <div class="big">No shadows. No glow. No glass.</div>
  <div class="quote">Elevation is communicated by typography and spacing — not z-axis. The site is opaque; nothing blurs anything.</div>
</div></body></html>

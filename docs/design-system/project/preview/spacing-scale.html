<!doctype html>
<html><head><meta charset="utf-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--paper); }
  .card { padding: 24px 28px; box-sizing: border-box; }
  .row { display: flex; gap: 14px; align-items: flex-end; }
  .step { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .box { background: var(--ink); }
  .lbl { font-family: var(--mono); font-size: 10px; color: var(--ink-3); }
  .name { font-family: var(--mono); font-size: 11px; color: var(--ink); margin-top: 2px; }
</style></head>
<body><div class="card">
  <div class="row">
    <div class="step"><div class="box" style="width:4px;height:4px"></div><div class="name">s-1</div><div class="lbl">4</div></div>
    <div class="step"><div class="box" style="width:8px;height:8px"></div><div class="name">s-2</div><div class="lbl">8</div></div>
    <div class="step"><div class="box" style="width:12px;height:12px"></div><div class="name">s-3</div><div class="lbl">12</div></div>
    <div class="step"><div class="box" style="width:16px;height:16px"></div><div class="name">s-4</div><div class="lbl">16</div></div>
    <div class="step"><div class="box" style="width:24px;height:24px"></div><div class="name">s-5</div><div class="lbl">24</div></div>
    <div class="step"><div class="box" style="width:32px;height:32px"></div><div class="name">s-6</div><div class="lbl">32</div></div>
    <div class="step"><div class="box" style="width:48px;height:48px"></div><div class="name">s-7</div><div class="lbl">48</div></div>
    <div class="step"><div class="box" style="width:64px;height:64px"></div><div class="name">s-8</div><div class="lbl">64</div></div>
    <div class="step"><div class="box" style="width:96px;height:96px"></div><div class="name">s-9</div><div class="lbl">96</div></div>
  </div>
</div></body></html>

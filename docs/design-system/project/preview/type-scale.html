<!doctype html>
<html><head><meta charset="utf-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--paper); }
  .card { padding: 20px 28px; box-sizing: border-box; }
  table { border-collapse: collapse; width: 100%; }
  td { padding: 6px 12px 6px 0; vertical-align: baseline; font-family: var(--mono); font-size: 12px; color: var(--ink-3); }
  td.spec { font-family: var(--serif); color: var(--ink); white-space: nowrap; }
  .display { font-size: 36px; line-height: 1.05; font-weight: 700; letter-spacing: -0.025em; }
  .h1 { font-size: 28px; line-height: 1.1; font-weight: 700; letter-spacing: -0.02em; }
  .h2 { font-size: 22px; line-height: 1.2; font-weight: 700; }
  .h3 { font-size: 18px; line-height: 1.3; font-weight: 600; }
  .body { font-size: 16px; line-height: 1.55; }
  .small { font-size: 14px; }
  .meta { font-family: var(--mono); font-size: 12px; color: var(--ink-3); }
</style></head>
<body><div class="card"><table>
  <tr><td class="spec display">Aa</td><td>--t-display</td><td>56 / 58 · −0.025em · 700</td></tr>
  <tr><td class="spec h1">Aa</td><td>--t-h1</td><td>40 / 44 · −0.02em · 700</td></tr>
  <tr><td class="spec h2">Aa</td><td>--t-h2</td><td>28 / 34 · −0.015em · 700</td></tr>
  <tr><td class="spec h3">Aa</td><td>--t-h3</td><td>22 / 29 · 600</td></tr>
  <tr><td class="spec body">Aa</td><td>--t-body</td><td>18 / 28 · 400</td></tr>
  <tr><td class="spec small">Aa</td><td>--t-small</td><td>15 / 23 · 400</td></tr>
  <tr><td class="meta">Aa</td><td>--t-meta</td><td>13 / 18 · mono</td></tr>
</table></div></body></html>

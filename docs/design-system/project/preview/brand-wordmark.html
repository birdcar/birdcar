<!doctype html>
<html><head><meta charset="utf-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--paper); }
  .card { padding: 28px 32px; box-sizing: border-box; }
  .wm { display: block; }
  .row { display: flex; align-items: center; gap: 40px; }
  .lbl { font-family: var(--mono); font-size: 10px; color: var(--ink-3); margin-top: 12px; text-transform: uppercase; letter-spacing: 1px; }
  .wordmark { font-family: var(--serif); font-size: 44px; font-weight: 700; color: var(--ink); letter-spacing: -0.02em; line-height: 1; }
  .tag { font-family: var(--mono); font-size: 11px; color: var(--clay); margin-top: 2px; }
</style></head>
<body><div class="card">
  <div class="row">
    <div>
      <div class="wordmark">Birdcar</div>
      <div class="tag">birdcar.dev</div>
    </div>
    <div style="border-left: 1px solid var(--rule); padding-left: 32px">
      <div class="wordmark" style="font-size:32px">Birdcar</div>
    </div>
    <div style="border-left: 1px solid var(--rule); padding-left: 32px">
      <div class="wordmark" style="font-size:22px">Birdcar.</div>
    </div>
  </div>
  <div class="lbl">Wordmark only · Source Serif 4 Bold · no icon mark</div>
</div></body></html>

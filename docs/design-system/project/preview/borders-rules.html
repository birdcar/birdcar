<!doctype html>
<html><head><meta charset="utf-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--paper); }
  .card { padding: 24px 28px; box-sizing: border-box; }
  .stack > * + * { margin-top: 22px; }
  .lbl { font-family: var(--mono); font-size: 10px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .single { border-top: 1px solid var(--rule); }
  .double { border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule); height: 4px; }
  .accent { border-left: 2px solid var(--clay); padding: 4px 0 4px 14px; font-style: italic; color: var(--ink-2); font-family: var(--serif); font-size: 16px; }
</style></head>
<body><div class="card"><div class="stack">
  <div><div class="lbl">Hairline · --rule · 1px</div><div class="single"></div></div>
  <div><div class="lbl">Double rule · the only ornament</div><div class="double"></div></div>
  <div><div class="lbl">Blockquote · 2px clay left-border</div><div class="accent">Most small-business software is sold by salespeople.</div></div>
</div></div></body></html>

<!doctype html>
<html><head><meta charset="utf-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--paper); }
  .card { padding: 22px 28px; box-sizing: border-box; }

  /* Featured (most recent) row — bigger, with a short summary */
  .featured {
    display: grid;
    grid-template-columns: 110px 1fr;
    gap: 24px;
    padding: 14px 0 18px;
    border-top: 2px solid var(--ink);
    border-bottom: 1px solid var(--rule);
    text-decoration: none;
    transition: background 120ms ease;
  }
  .featured:hover { background: var(--paper-2); }
  .featured:hover .f-title { color: var(--clay); }
  .f-meta { display: flex; flex-direction: column; gap: 4px; }
  .f-date { font-family: var(--mono); font-size: 12px; color: var(--ink-3); }
  .f-tag {
    font-family: var(--mono); font-size: 10px; color: var(--clay);
    letter-spacing: 1.5px; text-transform: uppercase;
  }
  .f-new {
    font-family: var(--mono); font-size: 10px;
    color: var(--paper); background: var(--clay);
    padding: 2px 6px; letter-spacing: 1px; text-transform: uppercase;
    align-self: flex-start; margin-top: 4px;
  }
  .f-title {
    font-family: var(--serif); font-size: 24px; line-height: 1.25;
    font-weight: 600; color: var(--ink); letter-spacing: -0.01em;
    transition: color 120ms ease;
  }
  .f-summary {
    font-family: var(--serif); font-size: 15px; line-height: 1.55;
    color: var(--ink-2); margin-top: 6px; max-width: 56ch;
  }

  /* Compact rows below */
  .row {
    display: grid;
    grid-template-columns: 110px 1fr auto;
    gap: 24px;
    align-items: baseline;
    padding: 12px 0;
    border-bottom: 1px solid var(--rule);
    text-decoration: none;
    transition: background 120ms ease;
  }
  .row:hover { background: var(--paper-2); }
  .row:hover .r-title { color: var(--clay); }
  .r-date { font-family: var(--mono); font-size: 13px; color: var(--ink-3); }
  .r-title { font-family: var(--serif); font-size: 18px; color: var(--ink); transition: color 120ms ease; }
  .r-tag {
    font-family: var(--mono); font-size: 10px; color: var(--ink-3);
    letter-spacing: 1px; text-transform: uppercase;
  }
</style></head>
<body><div class="card">
  <a href="#" class="featured">
    <div class="f-meta">
      <span class="f-date">2026-03-14</span>
      <span class="f-tag">Tax tools</span>
      <span class="f-new">New</span>
    </div>
    <div>
      <div class="f-title">Notes on Drake export, again</div>
      <div class="f-summary">A short follow-up after a second tax season of watching one CPA firm wrestle a specific export into a shape that's actually reviewable.</div>
    </div>
  </a>
  <a href="#" class="row">
    <span class="r-date">2026-02-22</span>
    <span class="r-title">Support engineering, slowly</span>
    <span class="r-tag">Work</span>
  </a>
  <a href="#" class="row">
    <span class="r-date">2026-01-30</span>
    <span class="r-title">A small CRM is fine, actually</span>
    <span class="r-tag">Consulting</span>
  </a>
</div></body></html>

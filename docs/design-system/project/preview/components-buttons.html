<!doctype html>
<html><head><meta charset="utf-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--paper); }
  .card { padding: 24px 28px; box-sizing: border-box; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .btn { font-family: var(--sans); font-size: 15px; font-weight: 500; padding: 10px 18px; border-radius: 2px; border: 1px solid transparent; cursor: pointer; transition: background 120ms ease; line-height: 1.2; }
  .btn-primary { background: #1A1814; color: #F7F3EC; }
  .btn-primary:hover { background: #4A453D; }
  .btn-secondary { background: transparent; color: #1A1814; border-color: #BFB59E; }
  .btn-secondary:hover { background: #EFE9DD; }
  .btn-link { background: transparent; color: #B8442B; padding: 10px 0; text-decoration: underline; text-underline-offset: 3px; }
  .btn-link:hover { color: #8E2F1B; }
  .btn[disabled] { color: #A89F90; border-color: #D9D1BE; cursor: not-allowed; background: transparent; }
  .lbl { font-family: var(--mono); font-size: 10px; color: var(--ink-3); margin-top: 14px; text-transform: uppercase; letter-spacing: 1px; }
</style></head>
<body><div class="card">
  <div class="row">
    <button class="btn btn-primary">Email me</button>
    <button class="btn btn-secondary">Read more</button>
    <button class="btn btn-link">View all writing ↗</button>
    <button class="btn btn-secondary" disabled>Disabled</button>
  </div>
  <div class="lbl">Primary · Secondary · Link · Disabled</div>
</div></body></html>

<!doctype html>
<html><head><meta charset="utf-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--paper); }
  .card { padding: 24px 28px; box-sizing: border-box; }
  .row { display: flex; gap: 20px; align-items: flex-start; }
  .swatch { flex: 1; }
  .chip { height: 84px; border-radius: 2px; margin-bottom: 8px; }
  .name { font-family: var(--mono); font-size: 12px; color: var(--ink); }
  .hex  { font-family: var(--mono); font-size: 11px; color: var(--ink-3); margin-top: 2px; }
  .use  { font-family: var(--sans); font-size: 12px; color: var(--ink-2); margin-top: 4px; line-height: 1.4; }
</style></head>
<body><div class="card">
  <div class="row">
    <div class="swatch"><div class="chip" style="background:#B8442B"></div><div class="name">--clay</div><div class="hex">#B8442B</div><div class="use">Links, brand mark, key accents</div></div>
    <div class="swatch"><div class="chip" style="background:#8E2F1B"></div><div class="name">--clay-2</div><div class="hex">#8E2F1B</div><div class="use">Link hover, pressed states</div></div>
    <div class="swatch"><div class="chip" style="background:#F2D8B6"></div><div class="name">--clay-tint</div><div class="hex">#F2D8B6</div><div class="use">Selection background, light highlight</div></div>
  </div>
</div></body></html>

<!doctype html>
<html><head><meta charset="utf-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--paper); }
  .card { padding: 22px 28px; box-sizing: border-box; }
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 18px; align-items: center; justify-items: center; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .item i { font-size: 24px; color: var(--ink-2); line-height: 1; }
  .name { font-family: var(--mono); font-size: 10px; color: var(--ink-3); }
  .note { font-family: var(--sans); font-size: 12px; color: var(--ink-3); margin-top: 14px; font-style: italic; }
</style></head>
<body><div class="card">
  <div class="grid">
    <div class="item"><i class="ph ph-rss"></i><div class="name">rss</div></div>
    <div class="item"><i class="ph ph-envelope"></i><div class="name">envelope</div></div>
    <div class="item"><i class="ph ph-github-logo"></i><div class="name">github</div></div>
    <div class="item"><i class="ph ph-magnifying-glass"></i><div class="name">search</div></div>
    <div class="item"><i class="ph ph-arrow-up-right"></i><div class="name">extlink</div></div>
    <div class="item"><i class="ph ph-arrow-right"></i><div class="name">arrow</div></div>
    <div class="item"><i class="ph ph-list"></i><div class="name">menu</div></div>
    <div class="item"><i class="ph ph-x"></i><div class="name">close</div></div>
  </div>
  <div class="note">Phosphor · Regular weight · ink-2 · used very sparingly. No emoji in UI.</div>
</div></body></html>

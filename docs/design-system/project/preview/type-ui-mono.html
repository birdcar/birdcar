<!doctype html>
<html><head><meta charset="utf-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--paper); }
  .card { padding: 24px 28px; box-sizing: border-box; }
  .row { display: flex; gap: 32px; align-items: flex-start; }
  .col { flex: 1; }
  .lbl { font-family: var(--mono); font-size: 10px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .ui { font-family: var(--sans); font-size: 15px; color: var(--ink); }
  .meta { font-family: var(--mono); font-size: 13px; color: var(--ink-3); }
  .meta-row { display: flex; gap: 16px; align-items: baseline; }
  .meta-row .date { color: var(--ink-3); }
  .meta-row .title { font-family: var(--serif); font-size: 18px; color: var(--ink); }
</style></head>
<body><div class="card"><div class="row">
  <div class="col">
    <div class="lbl">UI · Inter Tight 15</div>
    <div class="ui">Home &nbsp; About &nbsp; Work &nbsp; Writing &nbsp; Contact</div>
    <div class="ui" style="margin-top:8px; color: var(--ink-3)">Subscribe via RSS</div>
  </div>
  <div class="col">
    <div class="lbl">Mono · JetBrains Mono 13</div>
    <div class="meta-row"><span class="date">2026-03-14</span><span class="title">Notes on Drake export</span></div>
    <div class="meta-row" style="margin-top:6px"><span class="date">2026-02-02</span><span class="title">Support engineering, slowly</span></div>
  </div>
</div></div></body></html>

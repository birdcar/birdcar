<!doctype html>
<html><head><meta charset="utf-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--paper); }
  .card { padding: 28px 32px; box-sizing: border-box; }
  .display { font-family: var(--serif); font-size: 56px; line-height: 1.05; font-weight: 700; letter-spacing: -0.025em; color: var(--ink); margin: 0; }
  .meta { font-family: var(--mono); font-size: 11px; color: var(--ink-3); margin-top: 10px; }
</style></head>
<body><div class="card">
  <p class="display">I build internal tools.</p>
  <div class="meta">Source Serif 4 · 700 · 56/58 · letter-spacing −0.025em · t-display</div>
</div></body></html>

<!doctype html>
<html><head><meta charset="utf-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--paper); }
  .card { padding: 24px 28px; box-sizing: border-box; }
  .stack > * + * { margin-top: 14px; }
  .lbl { font-family: var(--mono); font-size: 10px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  h1, h2, h3 { margin: 0; font-family: var(--serif); color: var(--ink); }
  h1 { font-size: 40px; line-height: 1.1; font-weight: 700; letter-spacing: -0.02em; }
  h2 { font-size: 28px; line-height: 1.2; font-weight: 700; letter-spacing: -0.015em; }
  h3 { font-size: 22px; line-height: 1.3; font-weight: 600; }
</style></head>
<body><div class="card"><div class="stack">
  <div><div class="lbl">h1 · 40 / 44</div><h1>About this site, briefly</h1></div>
  <div><div class="lbl">h2 · 28 / 34</div><h2>How I work with clients</h2></div>
  <div><div class="lbl">h3 · 22 / 29</div><h3>Recent writing</h3></div>
</div></div></body></html>

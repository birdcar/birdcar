<!doctype html>
<html><head><meta charset="utf-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--paper); }
  .card { padding: 22px 28px; box-sizing: border-box; }
  .row { display: flex; gap: 24px; align-items: center; }
  svg { display: block; }
  .legend { font-family: var(--mono); font-size: 11px; color: var(--ink-3); display: flex; flex-direction: column; gap: 6px; }
  .legend .sw { display: inline-block; width: 16px; height: 2px; vertical-align: middle; margin-right: 6px; }
</style></head>
<body><div class="card"><div class="row">
  <svg viewBox="0 0 380 180" width="380" height="180">
    <!-- container -->
    <rect x="20" y="40" width="120" height="60" fill="#EFE9DD" stroke="#7A7368" stroke-width="1.5" rx="2"/>
    <text x="80" y="75" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#1A1814">Drake</text>
    <!-- arrow -->
    <line x1="140" y1="70" x2="240" y2="70" stroke="#1A1814" stroke-width="1.5"/>
    <polygon points="240,70 232,66 232,74" fill="#1A1814"/>
    <text x="190" y="62" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#7A7368">CSV</text>
    <!-- the answer (clay-filled) -->
    <rect x="240" y="40" width="120" height="60" fill="#1A1814" stroke="#1A1814" stroke-width="1.5" rx="2"/>
    <text x="300" y="75" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#F7F3EC">Review queue</text>
    <!-- highlight -->
    <line x1="300" y1="100" x2="300" y2="140" stroke="#B8442B" stroke-width="2.5"/>
    <polygon points="300,140 296,132 304,132" fill="#B8442B"/>
    <text x="300" y="160" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#B8442B">stamps</text>
  </svg>
  <div class="legend">
    <div><span class="sw" style="background:#1A1814"></span>primary</div>
    <div><span class="sw" style="background:#7A7368"></span>secondary</div>
    <div><span class="sw" style="background:#B8442B"></span>the point</div>
  </div>
</div></div></body></html>

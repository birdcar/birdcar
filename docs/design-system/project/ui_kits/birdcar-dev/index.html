<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Birdcar — internal tools and automations for small businesses in Fort Worth</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="I'm Nick Cannariato. I build internal tools and automations for small businesses in Fort Worth — usually CPAs, mortgage brokers, realtors, and operators in the $1–20M range. Project-based, 4–12 weeks, fixed scope.">
  <meta name="author" content="Nick Cannariato (Birdcar)">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Birdcar — internal tools for small businesses in Fort Worth">
  <meta property="og:description" content="Nick Cannariato builds internal tools and automations for small businesses in Fort Worth. Project-based, 4–12 weeks, fixed scope.">
  <meta property="og:url" content="https://birdcar.dev">
  <meta property="og:image" content="https://birdcar.dev/og.png">
  <meta name="twitter:card" content="summary_large_image">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Nick Cannariato",
    "alternateName": "Birdcar",
    "url": "https://birdcar.dev",
    "jobTitle": "Product engineer & consultant",
    "worksFor": { "@type": "Organization", "name": "WorkOS" },
    "address": { "@type": "PostalAddress", "addressLocality": "Fort Worth", "addressRegion": "TX", "addressCountry": "US" },
    "email": "hi@birdcar.dev",
    "sameAs": ["https://github.com/birdcar"]
  }
  </script>
  <link rel="stylesheet" href="../../colors_and_type.css">
  <link rel="stylesheet" href="kit.css?v=7">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="Button.jsx"></script>
  <script type="text/babel" src="Masthead.jsx"></script>
  <script type="text/babel" src="Footer.jsx"></script>
  <script type="text/babel" src="PostListItem.jsx"></script>
  <script type="text/babel" src="pages/Home.jsx"></script>
  <script type="text/babel" src="pages/About.jsx"></script>
  <script type="text/babel" src="pages/Work.jsx"></script>
  <script type="text/babel" src="pages/Writing.jsx"></script>
  <script type="text/babel" src="pages/Post.jsx"></script>
  <script type="text/babel" src="pages/Contact.jsx"></script>

  <script type="text/babel">
    function App() {
      const [page, setPage] = React.useState('home');
      React.useEffect(() => { window.scrollTo(0, 0); }, [page]);

      let Body;
      switch (page) {
        case 'about':   Body = <About onNav={setPage} />; break;
        case 'work':    Body = <Work onNav={setPage} />; break;
        case 'writing': Body = <Writing onNav={setPage} />; break;
        case 'post':    Body = <Post onNav={setPage} />; break;
        case 'contact': Body = <Contact onNav={setPage} />; break;
        case 'home':
        default:        Body = <Home onNav={setPage} />;
      }

      const navCurrent = page === 'post' ? 'writing' : page;

      return (
        <div className="bc-shell" data-screen-label={`Birdcar / ${page}`}>
          <div className="bc-page-wrap">
            <Masthead current={navCurrent} onNav={setPage} />
            <main className="bc-main">{Body}</main>
            <Footer onNav={setPage} />
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <!-- Boxes -->
  <g font-family="JetBrains Mono, monospace" font-size="12" fill="#1A1814">
    <rect x="20"  y="70" width="120" height="60" fill="#EFE9DD" stroke="#1A1814" stroke-width="1.5" rx="2" />
    <text x="80"  y="105" text-anchor="middle">.md source</text>

    <rect x="180" y="70" width="120" height="60" fill="#EFE9DD" stroke="#1A1814" stroke-width="1.5" rx="2" />
    <text x="240" y="100" text-anchor="middle">remark</text>
    <text x="240" y="116" text-anchor="middle" font-size="10" fill="#7A7368">@directives</text>

    <rect x="340" y="70" width="120" height="60" fill="#EFE9DD" stroke="#B8442B" stroke-width="2.5" rx="2" />
    <text x="400" y="100" text-anchor="middle" fill="#B8442B">rehype</text>
    <text x="400" y="116" text-anchor="middle" font-size="10" fill="#7A7368">resolve src,</text>

    <rect x="500" y="70" width="80"  height="60" fill="#1A1814" rx="2" />
